name: local-ollama
description: |
  Local Ollama on the default port. Uses ReAct text protocol so it works
  even with models that lack reliable native tool calling. Good default for
  llama3.1:8b, qwen2.5:7b, mistral-nemo, etc.

model:
  adapter: openai_compat
  base_url: http://localhost:11434/v1
  model: llama3.1:8b
  api_key: ollama
  temperature: 0.2

protocol: react_text

loop:
  kind: tool_loop
  max_steps: 25

memory: full_history

sandbox:
  kind: host_direct
  cwd: .

approval: confirm_destructive

tools: [shell, fs_read, fs_write]

tracer:
  kind: jsonl
  dir: .sele/runs
