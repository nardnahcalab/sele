name: openrouter
description: |
  OpenRouter routing to an open-source model with native tool calling.
  Plan-then-execute strategy. Reads OPENROUTER_API_KEY from the environment.

model:
  adapter: openai_compat
  base_url: https://openrouter.ai/api/v1
  model: meta-llama/llama-3.1-70b-instruct
  api_key_env: OPENROUTER_API_KEY
  temperature: 0.2
  extra_headers:
    HTTP-Referer: https://github.com/nardnahcalab/sele
    X-Title: sele

protocol: native_tools

loop:
  kind: plan_execute
  max_steps: 30

memory: full_history

sandbox:
  kind: host_direct
  cwd: .

approval: confirm_destructive

tools: [shell, fs_read, fs_write, python_exec, http]

tracer:
  kind: jsonl
  dir: .sele/runs
